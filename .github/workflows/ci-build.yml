name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        os: [ self-hosted, macos-latest, ubuntu-24.04-arm, macos-15-intel ]

      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set OS and ARCH variables
        run: |
          echo "OS=${{ runner.os == 'Linux' && 'linux' || 'mac' }}" >> $GITHUB_ENV
          echo "ARCH=${{ runner.arch == 'X64' && '64' || 'arm64' }}" >> $GITHUB_ENV
        shell: bash

      - name: Set up dependencies for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq cmake build-essential clang icu-devtools libfontconfig-dev

      - name: Set up dependencies for macOS
        if: runner.os == 'macOS'
        run: |
          brew update
          brew upgrade --formula cmake 
          brew install automake autoconf fontconfig
          brew install icu4c ucon64

      - name: Display versions macOs
        if: runner.os == 'macOS'
        run: |
          gcc -v
          g++ -v
          cmake --version          
          eval $(brew --cellar)/ucon64/*/bin/ucon64 -v

      - name: Display versions Linux
        if: runner.os == 'Linux'
        run: |
          gcc -v
          g++ -v
          cmake --version          
          uconv -v

      - name: Set env variables for macOS x64
        if: runner.os == 'macOS' && runner.arch == 'X64'
        run: |
          echo "C_INCLUDE_PATH=/usr/local/include" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=/usr/local/include" >> $GITHUB_ENV
#          echo "OS_GROBID='mac'" >> $GITHUB_ENV
#          echo "ARCH_GROBID='64'" >> $GITHUB_ENV
        shell: bash

      - name: Set env variables for macOS ARM64
        if: runner.os == 'macOS' && runner.arch == 'ARM64'
        run: |
          echo "C_INCLUDE_PATH=/opt/homebrew/include" >> $GITHUB_ENV
          echo "CPLUS_INCLUDE_PATH=/opt/homebrew/include" >> $GITHUB_ENV
#          echo "OS_GROBID='mac'" >> $GITHUB_ENV
#          echo "ARCH_GROBID='arm64'" >> $GITHUB_ENV
        shell: bash

      - name: Build for macOS
        if: runner.os == 'macOS'
        run: |
          cmake ./
          make

      - name: Build on Linux
        if: runner.os == 'Linux'
        run: |
          cmake ./
          make

      - name: Copy pdfalto executable
        run: |
          mkdir -p output/pdfalto/${{ env.OS }}/${{ env.ARCH }}
          cp pdfalto output/pdfalto/${{ env.OS }}/${{ env.ARCH }}

      - name: Save pdfalto executable
        uses: actions/upload-artifact@v4
        with:
          name: pdfalto-bin-${{ env.OS }}-${{ env.ARCH }}
          path: output

  assemble-artifact:
    needs: [ build ]
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
      - name: Move contents to output directory
        run: |
          for dir in output/*; do
            if [ -d "$dir" ]; then
              rsync -a "$dir"/* output/
              rm -rf "$dir"
            fi
          done
        shell: bash
      - name: Display structure of downloaded files
        run: ls -R
      - name: Get the revision ID
        id: extract_rev_id
        run: |
          SHORT_COMMIT_ID=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_commit_id=${SHORT_COMMIT_ID}" >> $GITHUB_OUTPUT
      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfalto-bin-all-${{ steps.extract_rev_id.outputs.short_commit_id }}
          path: output

  release:
    needs: [ assemble-artifact ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # required for softprops/action-gh-release to create the Release

    steps:
      - name: Download assembled artifact
        uses: actions/download-artifact@v4
        with:
          pattern: pdfalto-bin-all-*
          path: dist
          merge-multiple: true

      - name: Derive version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          version="${REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Show downloaded layout
        run: |
          find dist -maxdepth 4 -print

      - name: Create per-platform archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Shallow layout: each archive contains just the `pdfalto` binary at
          # the root, so users download `pdfalto-<version>-<os>-<arch>.tar.gz`,
          # extract, and the binary is right there. The combined bundle step
          # below preserves the full dist/pdfalto/<os>/<arch>/ tree instead.
          for plat_dir in dist/pdfalto/*/*/; do
            os=$(basename "$(dirname "$plat_dir")")
            arch=$(basename "$plat_dir")
            tar -czf "pdfalto-${VERSION}-${os}-${arch}.tar.gz" -C "$plat_dir" pdfalto
          done
          ls -l pdfalto-*.tar.gz

      - name: Create combined bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          tar -czf "pdfalto-${VERSION}-all.tar.gz" -C dist pdfalto

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pdfalto-*.tar.gz
          draft: false
          prerelease: false
          # body intentionally left empty — to be filled in manually on github.com
